server:
  port: 10000
  bind_address: "0.0.0.0"
  base_url: "${SEARXNG_BASE_URL}"
  secret_key: "${SEARXNG_SECRET_KEY}"

ui:
  default_theme: "simple"

search:
  safe_search: 0
  autocomplete: "duckduckgo"

engines:
  - name: "duckduckgo"
    engine: "duckduckgo"
    disabled: false

  - name: "google"
    engine: "google"
    disabled: false

  - name: "bing"
    engine: "bing"
    disabled: false

redis: null

outgoing:
  request_timeout: 3.0
